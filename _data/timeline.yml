- title: "Khởi Nguyên"
  description: "Thành lập với khát vọng thay đổi phương thức canh tác truyền thống, định hướng nông sản sạch và bền vững từ những ngày đầu."
  align: "left"

- title: "Bứt Phá"
  description: "Nghiên cứu thành công bộ sản phẩm chủ lực tiên phong, giúp giải quyết triệt để các vấn đề sâu bệnh nan y tại vựa lúa Miền Tây."
  align: "right"

- title: "Phủ Sóng"
  description: "Mở rộng mạng lưới đại lý chuyển giao kỹ thuật trên khắp cả nước, hỗ trợ hàng triệu hộ nông dân nâng tầm chất lượng nông sản."
  align: "left"

- title: "Vươn Tầm Quốc Tế"
  description: "Tập trung phát triển công nghệ sinh học xanh bền vững, hướng đến năm 2026 trở thành điểm tựa niềm tin lớn nhất của nền nông nghiệp sạch."
  align: "right"
