- icon: "seedling"
  title: "Cải Tạo & Kích Rễ"
  content: "Nền tảng hữu cơ sinh học cao cấp giúp hạ phèn nhanh, giải độc hữu cơ, thúc rễ mập cắm sâu hút trọn dưỡng chất đất trồng."

- icon: "flask-vial"
  title: "Dinh Dưỡng Đa Tầng"
  content: "Cung cấp tổ hợp vi lượng đa lượng thông minh, điều tiết cây đứng lá, đẻ nhánh hữu hiệu, thúc đòng to, trổ thoát đồng loạt mượt mà."

- icon: "shield"
  title: "Bảo Vệ Đa Lớp"
  content: "Hệ thống phòng trừ sâu bệnh nấm khuẩn lưu dẫn nội hấp thế hệ mới, cô lập mầm bệnh nhanh chóng nhưng cực kỳ mát bông và an toàn."
