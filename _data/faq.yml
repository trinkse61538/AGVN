- question: "Sản phẩm của AGVN Group có giúp giảm chi phí đầu tư thực tế không?"
  answer: "Có. Nhờ tích hợp các hoạt chất sinh học tiên tiến giúp tăng tối đa hiệu suất hấp thụ, bà con có thể giảm đến 30% lượng phân bón thông thường mà vẫn đảm bảo cây khỏe mạnh và đạt năng suất vượt trội."

- question: "Khi gặp sự cố kỹ thuật trên đồng ruộng, tôi có thể liên hệ hỗ trợ bằng cách nào?"
  answer: "AGVN Group duy trì đội ngũ kỹ sư hỗ trợ 24/7. Bà con có thể bấm trực tiếp vào biểu tượng Gọi điện hoặc nhắn Zalo/Messenger trên màn hình để được tư vấn phác đồ xử lý kịp thời tại ruộng miễn phí."

- question: "Dòng thuốc bảo vệ thực vật của AGVN có gây nóng cây hay rụng bông không?"
  answer: "Các dòng sản phẩm trừ bệnh tiên tiến của AGVN chủ yếu sử dụng công nghệ SC (huyền phục đậm đặc) và hoạt chất hữu cơ kháng sinh mới, đặc tính rất mát cây, an toàn tuyệt đối ngay cả ở giai đoạn lúa trổ bông nhạy cảm."
