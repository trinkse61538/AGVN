- name: "DƯỠNG ĐÒNG VÀNG"
  image: "https://raw.githubusercontent.com/trinkse61538/AGVN/24f9b3756526d585cd0e1eac5970906f40cfcd62/images/PhanBon/Du%CC%9Bo%CC%9B%CC%83ng%20%C4%90o%CC%80ng%20Va%CC%80ng%20AGVN%20catalouge.png"
  badge: "Phân bón hữu cơ"
  features:
    - "Bổ sung toàn diện: Cung cấp đầy đủ chất hữu cơ, đa lượng NPK và các trung vi lượng thiết yếu, giúp lúa khỏe mạnh, cứng cáp and tăng sức đề kháng."
    - "Cải tạo đất, chắc hạt: Thành phần hữu cơ giúp cải tạo đất, kích thích rễ phát triển mạnh, từ đó hấp thụ dinh dưỡng tốt hơn, giúp cây đứng lá and hạt chắc."
    - "Kích thích đòng to, bông dài, hạt nhiều, lúa trổ thoát nhanh và đồng loạt."

- name: "HẠT VÀNG"
  image: "https://raw.githubusercontent.com/trinkse61538/AGVN/24f9b3756526d585cd0e1eac5970906f40cfcd62/images/PhanBon/Ha%CC%A3t%20Va%CC%80ng%20catalouge.png"
  badge: "Phân bón hữu cơ"
  features:
    - "Vô gạo thần tốc, tăng tỉ lệ hạt chắc – sáng bông."
    - "Giữ xanh bộ lá đòng → quang hợp mạnh, chín chắc tới cậy."
    - "Bông chín lá xanh, lúa tươi nặng ký."

- name: "SIÊU RỄ NỞ BỤI"
  image: "https://raw.githubusercontent.com/trinkse61538/AGVN/24f9b3756526d585cd0e1eac5970906f40cfcd62/images/PhanBon/Sie%CC%82u%20Re%CC%82%CC%83%20No%CC%9B%CC%89%20Bu%CC%A3i%20catalouge.png"
  badge: "Phân bón hữu cơ"
  features:
    - "Axit Humic, P₂O₅ & K₂O: Tăng khả năng hấp thụ, giúp cây lúa khỏe thân, cứng cây và lá xanh bền vững."
    - "Hormone thực vật NAA & Cytokinin: Kích thích cây đẻ nhánh mạnh, nở bụi to đồng đều, tăng số bông."
    - "Chất hữu cơ 35%: Là nền tảng giúp cải tạo đất, cung cấp dinh dưỡng, làm rễ mập và cắm sâu."

- name: "HUMIC Zn++"
  image: "https://raw.githubusercontent.com/trinkse61538/AGVN/24f9b3756526d585cd0e1eac5970906f40cfcd62/images/PhanBon/HUMIC%20KE%CC%82M%20AGVN%20(CATALOG).png"
  badge: "Phân bón hữu cơ"
  features:
    - "Kích hoạt bộ rễ phát triển cực mạnh, cắm sâu, giúp cây lúa hấp thụ dinh dưỡng hiệu quả gấp đôi."
    - "Tăng mật độ chồi hữu hiệu, đảm bảo lúa nở bụi to."
    - "Giúp lúa mập đòng, lớn bông, gia tăng cả về số lượng và trọng lượng hạt."
    - "Cải tạo đất, hạ phèn, giải độc hữu cơ."
    - "Giảm đến 30% lượng phân bón nhưng vẫn đảm bảo đạt năng suất tối đa."

- name: "BOSIMAX"
  image: "https://raw.githubusercontent.com/trinkse61538/AGVN/24f9b3756526d585cd0e1eac5970906f40cfcd62/images/PhanBon/bosimax%20(sie%CC%82u%20lu%CC%80n)%20catalouge.png"
  badge: "Phân bón vi lượng"
  features:
    - "Cứng cây, ngắn lóng, đứng lá: Nhờ kiểm soát chiều cao cây lúa giúp cây cứng cáp, làm ngắn thân rạ, lá thẳng đứng, làm giảm nguy cơ đổ ngã do gió hoặc mưa lớn ở giai đoạn đòng và trổ bông."
    - "Tăng cường hệ rễ: Không gây ức chế sự phát triển của bộ rễ, đồng thời có thể kích thích sự phát triển của rễ giúp lúa tập trung dinh dưỡng đẻ nhánh mạnh, nuôi đòng to, bông lớn, tăng khả năng chống chịu thời tiết bất lợi."

- name: "SILIC K++"
  image: "https://raw.githubusercontent.com/trinkse61538/AGVN/24f9b3756526d585cd0e1eac5970906f40cfcd62/images/PhanBon/SILIC%20K%2B%2B%20CATALOG.png"
  badge: "Phân bón vi lượng"
  features:
    - "Vô gạo thần tốc, to chắc hạt: Giúp lúa chín chắc tới cây, hạn chế đổ ngã."
    - "Siêu lớn trái, ngọt trái: Trái to, đẹp màu, xanh gai, nặng ký; hạn chế rụng hoa/trái non."
    - "Ra rễ cực mạnh, cứng cây: Tạo lớp giáp bảo vệ đa tầng, chống chịu phèn, hạn, mặn và thời tiết bất lợi."
    - "Tăng năng suất: Tốiưu hấp thụ phân bón và giữ nước, gia tăng chất lượng nông sản."
